<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>tarjeta</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="container">
	<div class="controls">
		<input type="text" id="nameInput" placeholder="Nombre del usuario">
		<input type="text" id="cargoInput" placeholder="Cargo del usuario">
		<input type="color" id="colorPicker" value="#6366f1">
		<select id="fontSelector">
			<option value="Arial, sans-serif">Arial</option>
			<option value="'Times New Roman', serif">Times New Roman</option>
			<option value="Courier New, monospace">Courier New</option>
	  		<option value="Verdana, sans-serif">Verdana</option>
	    	<option value="Georgia, serif">Georgia</option>
	    	<option value="Tahoma, sans-serif">Tahoma</option>
	    	<option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
		</select>
		<p id="texto">Texto de ejemplo para cambiar fuente.</p>

	</div>
	<div class="card" id="profileCard">
		<div class="banner">
			
		</div>
		<div class="avatar">
			
		</div>
		<h2 id="displayName">Ingresa tu combre</h2>
		<h3 id="displayCargo">Ingresa tu cargo</h3>
		<p>Desarrollador Justin Hilario</p>
	</div>
	<button id="darkModeBtn">Modo oscuro 🌚</button>
</div>
<script src="fuction.js"></script>
</body>
</html>
